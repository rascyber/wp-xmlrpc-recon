name: CI

on:
  push:
    branches:
      - main
      - dev
      - scanner-engine
  pull_request:

jobs:
  bash-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate Bash syntax
        run: bash -n scanner/xmlrpc_scanner.sh

      - name: Start mock XML-RPC services
        run: |
          python3 - <<'PY' &
          from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
          from threading import Thread
          import time
          import sys

          LISTS = {
              18080: ["system.listMethods", "system.multicall", "pingback.ping", "wp.getUsersBlogs"],
              18081: ["system.listMethods", "wp.getUsersBlogs"],
          }

          def success_list(methods):
              values = "".join(
                  f"<value><string>{method}</string></value>" for method in methods
              )
              return (
                  "<?xml version='1.0'?>"
                  "<methodResponse><params><param><value><array><data>"
                  f"{values}"
                  "</data></array></value></param></params></methodResponse>"
              ).encode()

          AUTH_FAULT = (
              "<?xml version='1.0'?>"
              "<methodResponse><fault><value><struct>"
              "<member><name>faultCode</name><value><int>403</int></value></member>"
              "<member><name>faultString</name>"
              "<value><string>Incorrect username or password.</string></value></member>"
              "</struct></value></fault></methodResponse>"
          ).encode()

          class Handler(BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get("Content-Length", "0"))
                  body = self.rfile.read(length).decode("utf-8", "ignore")
                  methods = LISTS[self.server.server_port]
                  if "system.listMethods" in body:
                      payload = success_list(methods)
                  elif "wp.getUsersBlogs" in body:
                      payload = AUTH_FAULT
                  else:
                      payload = AUTH_FAULT
                  self.send_response(200)
                  self.send_header("Content-Type", "text/xml")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def log_message(self, format, *args):
                  return

          servers = []
          for port in (18080, 18081):
              server = ThreadingHTTPServer(("127.0.0.1", port), Handler)
              thread = Thread(target=server.serve_forever, daemon=True)
              thread.start()
              servers.append(server)

          try:
              while True:
                  time.sleep(1)
          except KeyboardInterrupt:
              for server in servers:
                  server.shutdown()
                  server.server_close()
              sys.exit(0)
          PY
          echo $! > mock_server.pid
          sleep 2

      - name: Run scanner
        run: ./scanner/xmlrpc_scanner.sh -i tests/test_targets.txt -o reports -d 0

      - name: Validate artifacts
        run: |
          latest_dir="$(find reports -maxdepth 1 -type d -name 'scan_*' | sort | tail -n 1)"
          test -n "$latest_dir"
          test -f "$latest_dir/xmlrpc_scan.csv"
          test -f "$latest_dir/xmlrpc_scan.html"
          test -f "$latest_dir/scan_summary.json"
          grep -q 'system.multicall' "$latest_dir/xmlrpc_scan.csv"
          grep -q 'pingback.ping' "$latest_dir/xmlrpc_scan.csv"

      - name: Stop mock XML-RPC services
        if: always()
        run: |
          if [ -f mock_server.pid ]; then
            kill "$(cat mock_server.pid)" || true
          fi
