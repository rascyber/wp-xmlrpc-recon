name: CI

on:
  push:
    branches:
      - main
      - dev
      - scanner-engine
  pull_request:

jobs:
  bash-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate Bash syntax
        run: |
          find scanner -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Start mock WordPress services
        run: |
          python3 tests/mock_wordpress_server.py &
          echo $! > mock_server.pid
          sleep 2

      - name: Run orchestrator
        run: ./scanner/wp_scan.sh -t tests/test_targets.txt --full -o reports

      - name: Validate artifacts
        run: |
          test -f reports/127.0.0.1_18080/report.json
          test -f reports/127.0.0.1_18081/report.html
          test -f reports/summary.csv
          grep -q 'contact-form-7' reports/127.0.0.1_18080/plugins.txt
          grep -q 'admin' reports/127.0.0.1_18080/users.txt
          grep -q 'system.multicall' reports/127.0.0.1_18080/xmlrpc_methods.txt
          grep -q 'rate_limiting_signals' reports/127.0.0.1_18081/login_surface.json

      - name: Stop mock WordPress services
        if: always()
        run: |
          if [ -f mock_server.pid ]; then
            kill "$(cat mock_server.pid)" || true
          fi
